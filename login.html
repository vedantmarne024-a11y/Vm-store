<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in | VM Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <main class="auth-shell">
        <a class="brand" href="index.html" aria-label="Go to VM Store home">
            <span class="brand-mark"><i></i><i></i><i></i><i></i></span>
            <span>VM Store</span>
        </a>

        <section class="auth-card" aria-labelledby="sign-in-heading">
            <div class="auth-intro">
                <span class="eyebrow"><i class="fa-solid fa-sparkles"></i> WELCOME BACK</span>
                <h1 id="sign-in-heading">Your next favourite app is waiting.</h1>
                <p>Sign in to pick up where your discoveries left off.</p>
            </div>

            <form class="auth-form" action="index.html">
                <label for="email">Email or username</label>
                <div class="input-box">
                    <i class="fa-regular fa-user" aria-hidden="true"></i>
                    <input id="email" name="email" type="text" placeholder="you@email.com" autocomplete="username" required>
                </div>

                <div class="label-row">
                    <label for="password">Password</label>
                    <a href="#">Forgot password?</a>
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-lock" aria-hidden="true"></i>
                    <input id="password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" required>
                </div>

                <label class="check-row" for="remember"><input id="remember" type="checkbox"> <span>Keep me signed in</span></label>
                <button class="primary-btn" type="submit">Sign in <i class="fa-solid fa-arrow-right"></i></button>
            </form>

            <div class="auth-divider"><span>new to VM Store?</span></div>
            <a class="secondary-btn" href="signup.html">Create an account</a>
        </section>

        <p class="auth-note">By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
    </main>
</body>
</html>
