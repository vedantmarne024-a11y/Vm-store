<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account | VM Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <main class="auth-shell">
        <a class="brand" href="index.html" aria-label="Go to VM Store home">
            <span class="brand-mark"><i></i><i></i><i></i><i></i></span>
            <span>VM Store</span>
        </a>

        <section class="auth-card signup-card" aria-labelledby="sign-up-heading">
            <div class="auth-intro">
                <span class="eyebrow"><i class="fa-solid fa-wand-magic-sparkles"></i> JOIN THE FUN</span>
                <h1 id="sign-up-heading">Make your store yours.</h1>
                <p>Save your favourites and discover more of what you love.</p>
            </div>

            <form class="auth-form" action="index.html">
                <div class="field-grid">
                    <div>
                        <label for="name">Full name</label>
                        <div class="input-box"><i class="fa-regular fa-user" aria-hidden="true"></i><input id="name" name="name" type="text" placeholder="Alex Morgan" autocomplete="name" required></div>
                    </div>
                    <div>
                        <label for="username">Username</label>
                        <div class="input-box"><i class="fa-solid fa-at" aria-hidden="true"></i><input id="username" name="username" type="text" placeholder="alexm" autocomplete="username" required></div>
                    </div>
                </div>

                <label for="signup-email">Email address</label>
                <div class="input-box"><i class="fa-regular fa-envelope" aria-hidden="true"></i><input id="signup-email" name="email" type="email" placeholder="you@email.com" autocomplete="email" required></div>

                <label for="signup-password">Create a password</label>
                <div class="input-box"><i class="fa-solid fa-lock" aria-hidden="true"></i><input id="signup-password" name="password" type="password" placeholder="At least 8 characters" minlength="8" autocomplete="new-password" required></div>

                <label class="check-row" for="updates"><input id="updates" type="checkbox" checked> <span>Send me occasional app picks and deals.</span></label>
                <button class="primary-btn" type="submit">Create account <i class="fa-solid fa-arrow-right"></i></button>
            </form>

            <p class="switch-account">Already have an account? <a href="login.html">Sign in</a></p>
        </section>

        <p class="auth-note">By creating an account, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
    </main>
</body>
</html>
